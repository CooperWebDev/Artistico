services:
  - type: web
    name: artistico-coyl
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: anime-walls-frontend
          property: host

  - type: web
    name: anime-walls-frontend
    runtime: static
    staticPublishPath: ./
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: artistico-coyl
          property: host